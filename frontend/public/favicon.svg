<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </radialGradient>
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- radar dish background -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#58A6FF" stroke-width="2"/>

  <!-- concentric grid rings -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#58A6FF" stroke-width="1" opacity="0.45"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="#58A6FF" stroke-width="1" opacity="0.45"/>
  <circle cx="32" cy="32" r="6"  fill="none" stroke="#58A6FF" stroke-width="1" opacity="0.45"/>

  <!-- crosshair -->
  <line x1="2"  y1="32" x2="62" y2="32" stroke="#58A6FF" stroke-width="1" opacity="0.35"/>
  <line x1="32" y1="2"  x2="32" y2="62" stroke="#58A6FF" stroke-width="1" opacity="0.35"/>

  <!-- sweep wedge (pie slice from centre up to 12 o'clock, fanning to ~2 o'clock) -->
  <path d="M 32 32 L 32 3 A 29 29 0 0 1 56.8 18.5 Z" fill="url(#sweep)"/>

  <!-- blip -->
  <circle cx="44" cy="20" r="2.6" fill="#58A6FF"/>
  <circle cx="44" cy="20" r="4.5" fill="#58A6FF" opacity="0.35"/>
</svg>
